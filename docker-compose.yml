x-hcd-common: &hcd-common
  build: .
  restart: on-failure:3
  cap_add:
    - NET_ADMIN
  deploy:
    resources:
      limits:
        memory: 768M
  networks:
    hcd-cluster:

x-healthcheck: &hcd-healthcheck
  test: ["CMD-SHELL", "cqlsh -e 'SELECT release_version FROM system.local' || exit 1"]
  interval: 15s
  timeout: 10s
  retries: 15
  start_period: 180s

x-shared-env: &shared-env
  CASSANDRA_CLUSTER_NAME: ${CASSANDRA_CLUSTER_NAME:-HCDCluster}
  CASSANDRA_SEEDS: 172.28.0.2,172.28.0.5
  CASSANDRA_RPC_ADDRESS: 0.0.0.0
  CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
  # JMX Prometheus exporter (active only when jmx_prometheus_javaagent.jar exists)
  JVM_EXTRA_OPTS: >-
    -javaagent:/opt/hcd/jmx_prometheus_javaagent.jar=9404:/opt/hcd/jmx-exporter.yml

services:
  # Datacenter 1
  hcd-node1:
    <<: *hcd-common
    container_name: hcd-node1
    hostname: hcd-node1
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.2
    environment:
      <<: *shared-env
      CASSANDRA_LISTEN_ADDRESS: 172.28.0.2
      CASSANDRA_BROADCAST_ADDRESS: 172.28.0.2
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      MAX_HEAP_SIZE: 512M
    volumes:
      - hcd-node1-data:/var/lib/cassandra
    ports:
      - "9042:9042"
    healthcheck:
      <<: *hcd-healthcheck

  hcd-node2:
    <<: *hcd-common
    container_name: hcd-node2
    hostname: hcd-node2
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.3
    environment:
      <<: *shared-env
      CASSANDRA_LISTEN_ADDRESS: 172.28.0.3
      CASSANDRA_BROADCAST_ADDRESS: 172.28.0.3
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack2
    volumes:
      - hcd-node2-data:/var/lib/cassandra
    depends_on:
      hcd-node1:
        condition: service_healthy
    healthcheck:
      <<: *hcd-healthcheck

  hcd-node3:
    <<: *hcd-common
    container_name: hcd-node3
    hostname: hcd-node3
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.4
    environment:
      <<: *shared-env
      CASSANDRA_LISTEN_ADDRESS: 172.28.0.4
      CASSANDRA_BROADCAST_ADDRESS: 172.28.0.4
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack3
    volumes:
      - hcd-node3-data:/var/lib/cassandra
    depends_on:
      hcd-node2:
        condition: service_healthy
    healthcheck:
      <<: *hcd-healthcheck

  # Datacenter 2
  hcd-node4:
    <<: *hcd-common
    container_name: hcd-node4
    hostname: hcd-node4
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.5
    environment:
      <<: *shared-env
      CASSANDRA_LISTEN_ADDRESS: 172.28.0.5
      CASSANDRA_BROADCAST_ADDRESS: 172.28.0.5
      CASSANDRA_DC: dc2
      CASSANDRA_RACK: rack1
    volumes:
      - hcd-node4-data:/var/lib/cassandra
    depends_on:
      hcd-node3:
        condition: service_healthy
    healthcheck:
      <<: *hcd-healthcheck

  hcd-node5:
    <<: *hcd-common
    container_name: hcd-node5
    hostname: hcd-node5
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.6
    environment:
      <<: *shared-env
      CASSANDRA_LISTEN_ADDRESS: 172.28.0.6
      CASSANDRA_BROADCAST_ADDRESS: 172.28.0.6
      CASSANDRA_DC: dc2
      CASSANDRA_RACK: rack2
    volumes:
      - hcd-node5-data:/var/lib/cassandra
    depends_on:
      hcd-node4:
        condition: service_healthy
    healthcheck:
      <<: *hcd-healthcheck

  hcd-node6:
    <<: *hcd-common
    container_name: hcd-node6
    hostname: hcd-node6
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.7
    environment:
      <<: *shared-env
      CASSANDRA_LISTEN_ADDRESS: 172.28.0.7
      CASSANDRA_BROADCAST_ADDRESS: 172.28.0.7
      CASSANDRA_DC: dc2
      CASSANDRA_RACK: rack3
    volumes:
      - hcd-node6-data:/var/lib/cassandra
    depends_on:
      hcd-node5:
        condition: service_healthy
    healthcheck:
      <<: *hcd-healthcheck

  # ─── Observability Stack (optional: docker compose --profile monitoring up) ───
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    profiles: ["monitoring"]
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.20
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    profiles: ["monitoring"]
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.21
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  hcd-cluster:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  hcd-node1-data:
  hcd-node2-data:
  hcd-node3-data:
  hcd-node4-data:
  hcd-node5-data:
  hcd-node6-data:
  prometheus-data:
  grafana-data:
